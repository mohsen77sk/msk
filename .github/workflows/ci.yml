  deploy-mirza-production:
    name: Deploy mirza (Production - Master)
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.mirza_affected == 'true' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Define Docker TAG
        id: vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "TAG=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Docker tag will be: prod-${SHORT_SHA}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.MIRZA_DOCKER_USERNAME }}
          password: ${{ secrets.MIRZA_DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.mirza -t $IMAGE_NAME:${{ steps.vars.outputs.TAG }} .
          docker tag $IMAGE_NAME:${{ steps.vars.outputs.TAG }} $IMAGE_NAME:latest

      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.TAG }}
          docker push $IMAGE_NAME:latest

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.MIRZA_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s (Production)
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG=prod-${SHORT_SHA}
          kubectl set image deployment/angular-app angular-app=${{ secrets.MIRZA_DOCKER_USERNAME }}/mirza:$TAG
          kubectl rollout status deployment/angular-app

  deploy-mirza-staging:
    name: Deploy mirza (Staging - Dev)
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.mirza_affected == 'true' && github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Define Docker TAG
        id: vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "TAG=staging-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Docker tag will be: staging-${SHORT_SHA}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.MIRZA_DOCKER_USERNAME }}
          password: ${{ secrets.MIRZA_DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.mirza -t $IMAGE_NAME:${{ steps.vars.outputs.TAG }} .
          docker tag $IMAGE_NAME:${{ steps.vars.outputs.TAG }} $IMAGE_NAME:staging

      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.TAG }}
          docker push $IMAGE_NAME:staging

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.MIRZA_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s (Staging)
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG=staging-${SHORT_SHA}
          kubectl set image deployment/angular-app-staging angular-app=${{ secrets.MIRZA_DOCKER_USERNAME }}/mirza:$TAG
          kubectl rollout status deployment/angular-app-staging
