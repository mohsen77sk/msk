<div class="flex min-w-0 flex-auto flex-col items-center justify-center" *transloco="let t">
  <div class="sm:shadow-level-1 sm:rounded-medium sm:bg-surface-container-low w-full px-4 py-8 sm:w-auto sm:p-12">
    <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">
      <!-- Logo -->
      <div class="w-12">
        <img src="assets/images/logo/logo.svg" alt="logo" />
      </div>

      <!-- Title -->
      <div class="text-headline-medium mt-8 font-extrabold">
        {{ t('signIn.sign-in') }}
      </div>
      <div class="mt-0.5 flex items-baseline font-medium">
        <span>
          {{ t('signIn.do-not-have-an-account') }}
        </span>
        <a class="text-primary ms-1 hover:underline" [routerLink]="['/sign-up']">
          {{ t('signIn.sign-up') }}
        </a>
      </div>

      <!-- Alert -->
      @if (alert()) {
        <msk-alert
          class="mt-8"
          [appearance]="'outline'"
          [showIcon]="false"
          [type]="alert()?.type ?? 'error'"
          [class.msk-shake]="alert()?.type === 'error'"
        >
          {{ alert()?.message }}
        </msk-alert>
      }

      <!-- Sign in form -->
      <form class="mt-6" [formRoot]="signInForm">
        <!-- Username field -->
        <mat-form-field class="mt-2 w-full">
          <mat-label> {{ t('signIn.username-or-phone') }} </mat-label>
          <input id="username" matInput [formField]="signInForm.username" />
          <mat-error [mskFormFieldError]="signInForm.username"></mat-error>
        </mat-form-field>

        <!-- Password field -->
        <mat-form-field class="mt-2 w-full">
          <mat-label> {{ t('signIn.password') }} </mat-label>
          <input
            id="password"
            matInput
            type="password"
            [formField]="signInForm.password"
            ngxTouchKeyboard
            #passwordVirtualKeyboard="ngxTouchKeyboard"
            #passwordField
          />
          <div matSuffix>
            <button
              type="button"
              matIconButton
              (click)="
                passwordField.type === 'password' ? (passwordField.type = 'text') : (passwordField.type = 'password')
              "
              [disabled]="passwordField.disabled"
            >
              <mat-icon class="icon-size-5">
                {{ passwordField.type === 'password' ? 'visibility' : 'visibility_off' }}
              </mat-icon>
            </button>
            <button
              type="button"
              matIconButton
              (click)="passwordVirtualKeyboard.togglePanel()"
              [disabled]="passwordField.disabled"
            >
              <mat-icon class="icon-size-5">keyboard</mat-icon>
            </button>
          </div>
          <mat-error [mskFormFieldError]="signInForm.password"></mat-error>
        </mat-form-field>

        <!-- Actions -->
        <div class="mt-2 inline-flex w-full items-center justify-between">
          <mat-checkbox formControlName="rememberMe"> {{ t('signIn.remember-me') }} </mat-checkbox>
          <a class="text-label-medium text-primary hover:underline focus:underline" [routerLink]="['/forgot-password']">
            {{ t('signIn.forgot-password') }}
          </a>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          class="mt-6 w-full"
          matButton="filled"
          [disabled]="signInForm().submitting()"
          [mskSpinner]="signInForm().submitting()"
        >
          {{ signInForm().submitting() ? '' : t('signIn.sign-in') }}
        </button>
      </form>
    </div>
  </div>
</div>
