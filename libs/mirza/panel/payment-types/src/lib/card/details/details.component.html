<msk-dialog
  *transloco="let t; prefix: 'paymentTypes.details'"
  [title]="t(data.action(), { name: data.item()?.name })"
  [hasAction]="data.action() !== 'view'"
  [primaryAction]="primaryAction"
  [trailing]="trailing"
>
  <!-- Content -->
  <ng-container
    [ngTemplateOutlet]="data.action() === 'view' ? viewTemplate : formTemplate"
    [ngTemplateOutletContext]="{ t: t }"
    msk-dialog-content
  ></ng-container>

  <ng-template #trailing>
    <button matIconButton (click)="editMode()">
      <mat-icon class="mat-icon-rtl-mirror text-current">edit</mat-icon>
    </button>
  </ng-template>

  <ng-template #primaryAction>
    <button matButton [disabled]="form.disabled" [mskSpinner]="form.disabled" (click)="saveAndClose()">
      <span *transloco="let t">{{ form.enabled ? t('save') : '' }}</span>
    </button>
  </ng-template>
</msk-dialog>

<ng-template #viewTemplate let-t="t">
  <div class="msk-group-list">
    <div class="msk-list-item subtitle">{{ t('specs') }}</div>
    <!-- Name -->
    <div class="msk-list-item">
      <mat-icon class="msk-list-item-icon">label</mat-icon>
      <div class="msk-list-item-content">
        <span>{{ data.item()?.name || '-' }}</span>
        <span>{{ t('name') }}</span>
      </div>
    </div>
    <!-- Default -->
    <div class="msk-list-item">
      <mat-icon class="msk-list-item-icon">check_circle</mat-icon>
      <div class="msk-list-item-content">
        <span>{{ t('isDefault') }}</span>
        <msk-state-chip class="mt-2" [checked]="data.item()?.isDefault"></msk-state-chip>
      </div>
    </div>
  </div>
  <div class="mt-6" *transloco="let t">
    <div class="text-title-small mb-4">{{ t('settings') }}</div>
    <div class="msk-group-list elevated">
      <div class="msk-list-item cursor-pointer" matRipple (click)="deletePaymentType()" aria-hidden="true">
        <div class="msk-list-item-icon">
          <mat-icon class="text-error">delete</mat-icon>
        </div>
        <div class="msk-list-item-content text-error">
          {{ t('paymentTypes.delete') }}
        </div>
      </div>
    </div>
  </div>
</ng-template>

<ng-template #formTemplate let-t="t">
  <form class="flex flex-auto flex-col gap-y-2" [formGroup]="form">
    <!-- Alert -->
    @if (alert().show) {
      <msk-alert class="mb-4" appearance="outline" type="error">
        {{ alert().message }}
      </msk-alert>
    }

    <!-- Name -->
    <mat-form-field>
      <mat-label>{{ t('name') }}</mat-label>
      <input matInput formControlName="name" maxlength="128" autocomplete="off" />
      <mat-error>{{ formErrors['name'] }}</mat-error>
    </mat-form-field>

    <!-- Is default -->
    <div class="flex gap-2">
      <mat-checkbox formControlName="isDefault">{{ t('isDefault') }}</mat-checkbox>
    </div>
  </form>
</ng-template>
