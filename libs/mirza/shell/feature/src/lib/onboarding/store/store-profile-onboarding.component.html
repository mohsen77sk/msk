<div class="flex min-w-0 flex-auto flex-col items-center justify-center" *transloco="let t; prefix: 'onboarding'">
  <div class="sm:shadow-level-1 sm:rounded-medium sm:bg-surface-container-low w-full px-4 py-8 sm:w-auto sm:p-12">
    <div class="mx-auto w-full max-w-96 sm:mx-0 sm:w-96">
      <div class="w-12">
        <img src="assets/images/logo/logo.svg" alt="logo" />
      </div>

      <div class="text-headline-medium mt-8 font-extrabold">
        {{ t('store-profile-title') }}
      </div>
      <div class="mt-0.5 font-medium">
        {{ t('store-profile-subtitle') }}
      </div>

      @if (alert()) {
        <msk-alert
          class="mt-8"
          [appearance]="'outline'"
          [showIcon]="false"
          [type]="alert()?.type ?? 'error'"
          [class.msk-shake]="alert()?.type === 'error'"
        >
          {{ alert()?.message }}
        </msk-alert>
      }

      <form class="mt-6" [formRoot]="profileForm">
        <div class="mb-6 flex items-center gap-4">
          <msk-avatar
            [name]="profileForm().value().name || currentStore()?.name || ''"
            [imageUrl]="currentStore()?.logoUrl"
            size="big"
          ></msk-avatar>

          <div class="min-w-0 flex-1">
            <button type="button" matButton="outlined" (click)="logoInput.click()">
              <mat-icon>add_a_photo</mat-icon>
              <span>{{ t('upload-logo') }}</span>
            </button>
            <input
              #logoInput
              hidden
              type="file"
              accept="image/jpeg,image/png,image/webp"
              (change)="selectLogo($event)"
            />
            @if (logoFile()) {
              <div class="text-body-small text-on-surface-variant mt-2 truncate">
                {{ logoFile()?.name }}
              </div>
            }
          </div>
        </div>

        <mat-form-field class="w-full">
          <mat-label>{{ t('store-name') }}</mat-label>
          <input id="storeProfileName" matInput autocomplete="organization" [formField]="profileForm.name" />
          <mat-error [mskFormFieldError]="profileForm.name"></mat-error>
        </mat-form-field>

        <button
          type="submit"
          class="mt-6 w-full"
          matButton="filled"
          [disabled]="profileForm().submitting()"
          [mskSpinner]="profileForm().submitting()"
        >
          {{ profileForm().submitting() ? '' : t('save-store-profile') }}
        </button>

        <button
          type="button"
          class="mt-3 w-full"
          matButton="text"
          [disabled]="profileForm().submitting()"
          (click)="skip()"
        >
          {{ t('skip-for-now') }}
        </button>
      </form>
    </div>
  </div>
</div>
