<div
  class="inline-flex items-center rounded-full p-0.5"
  [class]="
    checked() ? 'bg-secondary-container text-on-secondary-container' : 'bg-surface-container-high text-on-surface'
  "
>
  <mat-icon class="fill icon-size-5">{{ checked() ? 'check_circle' : 'do_not_disturb_on' }}</mat-icon>
  <span class="text-label-medium px-1.5">{{ labelValue() }}</span>
</div>
